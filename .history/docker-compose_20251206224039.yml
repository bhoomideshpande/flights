services:
  web:
    build: .
    command: ["/app/entrypoint.sh", "gunicorn", "capstone.wsgi:application", "--bind", "0.0.0.0:8000", "--workers", "3"]
    ports:
      - "8000:8000"             # host:container
    env_file:
      - .env
    # volumes:
    #   - .:/app
    # Note: Volume mount disabled to prevent Windows line endings from overwriting the normalized entrypoint.sh
    # For development with live code reload, enable the volume and ensure entrypoint.sh has LF line endings
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./capstone/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - web
    restart: unless-stopped

  # Grafana - commented out due to Docker registry CDN issues
  # To enable: manually pull the image using alternative methods, then uncomment
  # grafana:
  #   image: grafana/grafana:latest
  #   container_name: grafana
  #   ports:
  #     - "3000:3000"
  #   environment:
  #     - GF_SECURITY_ADMIN_USER=admin
  #     - GF_SECURITY_ADMIN_PASSWORD=admin
  #   volumes:
  #     - grafana-storage:/var/lib/grafana
  #   depends_on:
  #     - prometheus
  #   restart: unless-stopped

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    ports:
      - "8081:8080"   # host 8081 -> cadvisor 8080
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    restart: unless-stopped

volumes:
  grafana-storage:
