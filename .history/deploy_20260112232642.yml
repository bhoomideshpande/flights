---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flight-ticket-booking
  labels:
    app: flight-ticket-booking
spec:
  replicas: 1
  selector:
    matchLabels:
      app: flight-ticket-booking
  template:
    metadata:
      labels:
        app: flight-ticket-booking
    spec:
      containers:
      - name: flight-ticket-booking
        image: flight-ticket-booking:latest
        ports:
        - containerPort: 8000
        env:
        - name: DEBUG
          value: "False"
        - name: ALLOWED_HOSTS
          value: "*"
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"

---
apiVersion: v1
kind: Service
metadata:
  name: flight-ticket-booking-service
  labels:
    app: flight-ticket-booking
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 8000
    protocol: TCP
  selector:
    app: flight-ticket-booking
